name: Daily Kids Cartoon Video Generator & Uploader

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # 🔄 FIX: Timeout 60 se 90 kar diya taaki heavy Kaggle rendering cancel na ho

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (FFmpeg + fonts for subtitles)
        run: |
          sudo apt-get update -y
          # 🔄 FIX: --no-install-recommends add kiya taaki faltu packages download na hon aur process hang na ho
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline (generate + upload)
        env:
          # 🔄 VIRAL FIX: Gemini hata kar Mistral API Key bind kar di hai
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          YOUTUBE_PRIVACY_STATUS: "public"
          VIDEO_ORIENTATION: "vertical"
          NUM_SCENES: "10"
        run: python main.py

      - name: Upload generated video as workflow artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.run_number }}
          path: output/final_video.mp4
          retention-days: 7
